services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleetbase
      POSTGRES_PASSWORD: fleetbase
      POSTGRES_DB: fleetbase
    ports:
      - "5432:5432"
    volumes:
      - fleetbase_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetbase -d fleetbase"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fleetbase_postgres:
