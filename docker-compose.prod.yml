services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-fleetbase}
    volumes:
      - fleetbase_postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRES_PASSWORD psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SCHEMA: public
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      postgres:
        condition: service_healthy
    # App wird direkt auf dem Host veröffentlicht. Caddy (auf dem Host)
    # macht das TLS/Domain-Reverse-Proxying auf diesen Port.
    # Bindung nur an localhost, damit der Klartext-Port nicht öffentlich
    # (unter Umgehung von HTTPS) erreichbar ist. Läuft Caddy in einem eigenen
    # Container, APP_BIND auf 0.0.0.0 setzen.
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8082}:3000"
    volumes:
      - fleetbase_uploads_prod:/app/public/uploads

  # Optionaler nginx-Reverse-Proxy. Wird NICHT benötigt, wenn Caddy davor
  # läuft. Nur bei Bedarf aktivieren: `docker compose --profile nginx up -d`.
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles:
      - nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  fleetbase_postgres_prod:
  fleetbase_uploads_prod:
